<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagnoSphere™ - Mapa de Intensidad Electromagnética</title>
    <meta name="description" content="Proyecto MagnoSphere™ por Andrés Felipe Colorado González">
    <meta name="author" content="Andrés Felipe Colorado González">
    <meta name="dcterms.created" content="2026-06-26">
    <meta name="google-site-verification" content="F3ONxYyuwMM8noGLGRLlze6Muzy1O4E1U4sfsFWxt08" />
    
    <!-- Leaflet CSS para el mapa real -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script data-goatcounter="https://magnosphere.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin: 20px 0 10px 0;
        }
        .subtitle { color: #a0a0a0; margin-bottom: 20px; }
        #map { 
            height: 400px; 
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            border: 2px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .info {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            max-width: 600px;
            margin: 20px auto;
        }
        footer { margin: 40px 0; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <h1>MagnoSphere™</h1>
    <p class="subtitle">Mapa Global de Intensidad Electromagnética</p>
    
    <div id="map"></div>
    
    <div class="info">
        <p><strong>Autor:</strong> Andrés Felipe Colorado González</p>
        <p><strong>Ubicación:</strong> Jerez de la Frontera, España</p>
        <p><strong>Fecha de creación:</strong> 26 de junio de 2026</p>
        <p><strong>Estado:</strong> Marca en trámite OEPM</p>
    </div>
    
    <footer>
        <p>© 2026 MagnoSphere™ | Todos los derechos reservados</p>
    </footer>

    <!-- Leaflet JS para el mapa real -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Crear mapa real centrado en el mundo
        const map = L.map('map').setView([20, 0], 2);
        
        // Capa de mapa oscuro
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB'
        }).addTo(map);

        // Puntos de intensidad con colores neón
        const points = [
            {lat: 36.68, lng: -6.13, color: '#00ffff', name: 'Jerez - Alta'}, 
            {lat: 40.42, lng: -3.70, color: '#ffff00', name: 'Madrid - Media'}, 
            {lat: 51.50, lng: -0.12, color: '#ff00ff', name: 'Londres - Baja'}, 
            {lat: 35.68, lng: 139.69, color: '#00ffff', name: 'Tokio - Alta'}, 
            {lat: 40.71, lng: -74.00, color: '#ffff00', name: 'NY - Media'}, 
            {lat: -33.86, lng: 151.20, color: '#ff00ff', name: 'Sydney - Baja'} 
        ];

        points.forEach(p => {
            L.circleMarker([p.lat, p.lng], {
                radius: 8,
                fillColor: p.color,
                color: '#fff',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(p.name);
        });
    </script>
</body>
</html>
